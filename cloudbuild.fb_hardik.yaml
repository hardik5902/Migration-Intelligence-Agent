substitutions:
  _SERVICE_NAME: migration-intel-fb
  _IMAGE_NAME: migration-intel-fb
  _REGION: us-central1
  _MIN_INSTANCES: '1'
  _CONCURRENCY: '2'

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$BUILD_ID'
  - '-t'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'
  - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$BUILD_ID'

- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest'

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - '${_SERVICE_NAME}'
  - '--image=gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$BUILD_ID'
  - '--region=${_REGION}'
  - '--allow-unauthenticated'
  - '--ingress=all'
  - '--min-instances=${_MIN_INSTANCES}'
  - '--concurrency=${_CONCURRENCY}'
  - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}'
  - '--port=8080'
  - '--timeout=300'

images:
- 'gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$BUILD_ID'
