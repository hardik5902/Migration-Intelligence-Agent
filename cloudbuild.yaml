steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/migration-intelligence-agent', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/migration-intelligence-agent']

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'migration-intelligence-agent'
  - '--image=gcr.io/$PROJECT_ID/migration-intelligence-agent'
  - '--region=us-central1'
  - '--allow-unauthenticated'
  - '--port=8080'
  - '--timeout=300'
